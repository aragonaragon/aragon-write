<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 420px;
      height: 280px;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-app-region: drag;
      user-select: none;
    }

    .card {
      width: 100%;
      height: 100%;
      background: linear-gradient(150deg, #fdf8f0 0%, #f5e9d0 60%, #eddfc0 100%);
      border-radius: 18px;
      box-shadow:
        0 24px 64px rgba(0, 0, 0, 0.28),
        0 0 0 1px rgba(180, 140, 90, 0.18);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 40px;
    }

    .icon {
      font-size: 52px;
      line-height: 1;
      animation: float 3s ease-in-out infinite;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.12));
    }

    .title {
      font-size: 30px;
      font-weight: 800;
      color: #2c1a0e;
      letter-spacing: -0.5px;
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
    }

    .subtitle {
      font-size: 13px;
      color: #9c7a5a;
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      letter-spacing: 0.3px;
    }

    .loader {
      display: flex;
      gap: 7px;
      margin-top: 6px;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #c8956c;
      animation: bounce 1.4s ease-in-out infinite;
    }

    .dot:nth-child(1) { animation-delay: 0s; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0) scale(0.7); opacity: 0.4; }
      40% { transform: translateY(-6px) scale(1); opacity: 1; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(-2deg); }
      50% { transform: translateY(-5px) rotate(2deg); }
    }

    .line {
      width: 60px;
      height: 1.5px;
      background: linear-gradient(90deg, transparent, #c8956c, transparent);
      margin: 2px 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✍️</div>
    <div class="title">أرغون رايت</div>
    <div class="line"></div>
    <div class="subtitle">جاري تشغيل المحرر...</div>
    <div class="loader">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
</body>
</html>
